name: 🚀 Aurum Banking — CD Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to deploy (e.g. v1.2.0)'
        required: false
        default: ''

env:
  JAVA_VERSION: '25'
  JAVA_DISTRIBUTION: 'temurin'
  APP_NAME: aurum-core-banking
  DEPLOY_PATH: /opt/aurum
  SERVICE_NAME: aurum-banking

jobs:

  # ─────────────────────────────────────────
  # JOB 1 — Build production JAR
  # ─────────────────────────────────────────
  build:
    name: 📦 Build Production JAR
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core-banking

    outputs:
      version: ${{ steps.version.outputs.version }}
      jar-name: ${{ steps.version.outputs.jar-name }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          cache: maven

      - name: Extract project version
        id: version
        run: |
          VERSION=$(mvn help:evaluate \
            -Dexpression=project.version -q -DforceStdout)
          JAR_NAME="${{ env.APP_NAME }}-${VERSION}.jar"
          echo "version=${VERSION}"   >> $GITHUB_OUTPUT
          echo "jar-name=${JAR_NAME}" >> $GITHUB_OUTPUT
          echo "Building version: ${VERSION}"

      - name: Build production JAR (tests already ran in CI)
        run: |
          mvn package \
            -DskipTests \
            -Dspring.profiles.active=prod \
            --no-transfer-progress

      - name: Verify JAR was built
        run: |
          ls -lh target/*.jar
          echo "JAR checksum:"
          sha256sum target/${{ steps.version.outputs.jar-name }}

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: production-jar
          path: core-banking/target/${{ steps.version.outputs.jar-name }}
          retention-days: 30

  # ─────────────────────────────────────────
  # JOB 2 — Deploy to VPS
  # ─────────────────────────────────────────
  deploy:
    name: 🚀 Deploy to Production VPS
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: production
      url: https://${{ secrets.PRODUCTION_DOMAIN }}

    steps:
      - uses: actions/checkout@v4

      - name: Download production JAR
        uses: actions/download-artifact@v4
        with:
          name: production-jar
          path: ./target

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          # Write private key from secret — never echo to logs
          printf '%s\n' "${{ secrets.VPS_SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          # Trust the VPS host key
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Copy JAR to VPS
        run: |
          JAR="${{ needs.build.outputs.jar-name }}"
          echo "Deploying: ${JAR}"
          scp -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=yes \
            "./target/${JAR}" \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:${{ env.DEPLOY_PATH }}/app-new.jar"

      - name: Deploy and restart service
        run: |
          ssh -i ~/.ssh/id_rsa \
            -o StrictHostKeyChecking=yes \
            "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            bash -s << 'ENDSSH'

          set -euo pipefail

          DEPLOY_PATH="${{ env.DEPLOY_PATH }}"
          SERVICE="${{ env.SERVICE_NAME }}"

          echo "=== Starting deployment ==="

          # 1. Backup current JAR
          if [ -f "${DEPLOY_PATH}/app.jar" ]; then
            cp "${DEPLOY_PATH}/app.jar" "${DEPLOY_PATH}/app-backup.jar"
            echo "Backed up current JAR"
          fi

          # 2. Replace with new JAR
          mv "${DEPLOY_PATH}/app-new.jar" "${DEPLOY_PATH}/app.jar"
          echo "New JAR in place"

          # 3. Restart service
          sudo systemctl restart "${SERVICE}"
          echo "Service restarted"

          # 4. Wait for startup (max 60 seconds)
          for i in $(seq 1 12); do
            sleep 5
            STATUS=$(systemctl is-active "${SERVICE}" 2>/dev/null || echo "unknown")
            if [ "${STATUS}" = "active" ]; then
              echo "Service is active after $((i * 5))s"
              break
            fi
            echo "Waiting... (${i}/12) status=${STATUS}"
          done

          # 5. Final status check — rollback on failure
          if ! systemctl is-active --quiet "${SERVICE}"; then
            echo "DEPLOYMENT FAILED — rolling back"
            cp "${DEPLOY_PATH}/app-backup.jar" "${DEPLOY_PATH}/app.jar"
            sudo systemctl restart "${SERVICE}"
            exit 1
          fi

          echo "=== Deployment successful ==="
          ENDSSH

      - name: Smoke test — health endpoint
        run: |
          echo "Waiting 20s for Spring Boot to fully start..."
          sleep 20

          HEALTH=$(curl -sf \
            --max-time 10 \
            "https://${{ secrets.PRODUCTION_DOMAIN }}/actuator/health" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")

          if [ "${HEALTH}" = "UP" ]; then
            echo "✅ Smoke test passed — application is UP"
          else
            echo "❌ Smoke test FAILED — status: ${HEALTH}"
            exit 1
          fi

      - name: Notify deployment success
        if: success()
        run: |
          echo "✅ Deployment complete"
          echo "Version : ${{ needs.build.outputs.version }}"
          echo "URL     : https://${{ secrets.PRODUCTION_DOMAIN }}"

      - name: Notify deployment failure
        if: failure()
        run: |
          echo "❌ Deployment FAILED for version ${{ needs.build.outputs.version }}"
          echo "Automatic rollback was attempted on the VPS"
