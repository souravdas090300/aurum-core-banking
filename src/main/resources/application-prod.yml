# Production profile — overrides defaults in application.yml
# Loaded when: -Dspring.profiles.active=prod  OR  SPRING_PROFILES_ACTIVE=prod

spring:

  # ── Database ──────────────────────────────────────────────────────────────
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/banking_db}
    username: ${SPRING_DATASOURCE_USERNAME:banking_user}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    hikari:
      pool-name: AurumHikariPool
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000        # 30 s — fail fast rather than queue
      idle-timeout: 600000             # 10 min
      max-lifetime: 1800000            # 30 min (< server wait_timeout)
      leak-detection-threshold: 60000  # warn if connection held > 60 s
      connection-test-query: SELECT 1

  jpa:
    show-sql: false                    # never log SQL in production
    open-in-view: false
    properties:
      hibernate:
        generate_statistics: false
        format_sql: false

  flyway:
    enabled: true
    baseline-on-migrate: false         # schema must be clean in prod

  # ── Security / JWT ────────────────────────────────────────────────────────
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWK_URI:http://localhost:8180/realms/banking/protocol/openid-connect/certs}
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/banking}

  # ── Lifecycle ────────────────────────────────────────────────────────────
  lifecycle:
    timeout-per-shutdown-phase: 30s

  # ── Web / Error Handling ─────────────────────────────────────────────────
  web:
    error:
      include-stacktrace: never        # never expose stack traces externally
      include-message: never

# ── Server ────────────────────────────────────────────────────────────────
server:
  port: 8080
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/plain
    min-response-size: 1024
  http2:
    enabled: true
  shutdown: graceful                   # drain in-flight requests before stopping

# ── Actuator ─────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: never              # no internal details on the public port
      probes:
        enabled: true                  # /actuator/health/liveness + /readiness
  metrics:
    tags:
      application: aurum-core-banking
      environment: production

# ── Logging ──────────────────────────────────────────────────────────────
logging:
  level:
    root: WARN
    com.aurum.corebanking: INFO
    org.springframework.security: WARN
    org.springframework.web: WARN
    org.flywaydb: INFO
    com.zaxxer.hikari: WARN
  pattern:
    # Structured JSON pattern — shipped to centralised log aggregator
    console: '{"timestamp":"%d{yyyy-MM-dd HH:mm:ss.SSS}","level":"%level","thread":"%thread","logger":"%logger{36}","message":"%message","exception":"%ex{full}"}%n'
  file:
    name: /opt/aurum/logs/aurum-banking.log
