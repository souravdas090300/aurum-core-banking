spring:
  datasource:
    url: ${TESTCONTAINERS_POSTGRES_URL:jdbc:postgresql://localhost:5432/test}
    username: test
    password: test
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        "[format_sql]": true

  flyway:
    enabled: true
    locations: classpath:db/migration

  security:
    oauth2:
      resourceserver:
        jwt:
          # Disabled for tests — security is bypassed via @WithMockUser / mock JWT
          jwk-set-uri: ""

encryption:
  secret-key: "0123456789abcdef0123456789abcdef"

rate-limit:
  transfer:
    capacity: 1000
    refill-tokens: 1000
    refill-seconds: 60

logging:
  level:
    "[com.aurum]": DEBUG
    "[org.drools]": WARN
