spring:
  application:
    name: aurum-core-banking

  datasource:
    url: jdbc:postgresql://localhost:5432/banking_db
    username: banking_user
    password: ${DB_PASSWORD:changeme_local}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate        # Flyway owns the schema, NOT Hibernate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 25

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080
  error:
    include-message: never      # Never leak internal errors
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    com.aurum: DEBUG
    org.springframework.security: INFO