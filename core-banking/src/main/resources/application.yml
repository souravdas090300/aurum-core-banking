spring:
  application:
    name: aurum-core-banking

  datasource:
    url: jdbc:postgresql://localhost:5432/aurum_banking
    username: aurum
    password: ${DB_PASSWORD:aurum_secret}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        "[format_sql]": true
        "[default_schema]": public

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWK_URI:http://localhost:8080/realms/aurum/protocol/openid-connect/certs}
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8080/realms/aurum}

encryption:
  secret-key: ${AES_SECRET_KEY:0123456789abcdef0123456789abcdef}  # 32-byte hex key

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers
  endpoint:
    health:
      show-details: when-authorized
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        "[banking.transfers.processing.time]": true
        "[banking.fraud.evaluation.time]": true
    tags:
      app: aurum-core-banking

# Enable Spring @Scheduled and @Async
spring.task.scheduling.pool.size: 4
spring.task.execution.pool.core-size: 8

rate-limit:
  transfer:
    capacity: 10
    refill-tokens: 10
    refill-seconds: 60

logging:
  level:
    "[com.aurum]": INFO
    "[org.drools]": WARN
    "[org.springframework.security]": WARN
