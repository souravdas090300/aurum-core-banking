# yaml-language-server: $schema=https://www.schemastore.org/schemas/json/application.json
# Spring Boot Application Configuration
spring:
  application:
    name: aurum-core-banking

  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password: 
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        "[format_sql]": true

  flyway:
    enabled: false

  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.security.oauth2.resource.servlet.OAuth2ResourceServerAutoConfiguration

  task:
    scheduling:
      pool:
        size: 4
    execution:
      pool:
        core-size: 8

  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWK_URI:http://localhost:8180/realms/banking/protocol/openid-connect/certs}
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/banking}

# WARNING: Change the default encryption key in production!
# Set AES_SECRET_KEY environment variable with a secure 32-byte hex key
encryption:
  secret-key: ${AES_SECRET_KEY:0123456789abcdef0123456789abcdef}  # 32-byte hex key (dev only)

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,loggers
  endpoint:
    health:
      show-details: when-authorized
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        "[banking.transfers.processing.time]": true
        "[banking.fraud.evaluation.time]": true
    tags:
      app: aurum-core-banking

rate-limit:
  transfer:
    capacity: 10
    refill-tokens: 10
    refill-seconds: 60

logging:
  level:
    "[com.aurum]": INFO
    "[org.drools]": WARN
    "[org.springframework.security]": WARN
