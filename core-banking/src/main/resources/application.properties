spring.application.name=core-banking

# ─── Server ───────────────────────────────────────────────
server.port=8080

# ─── DataSource (PostgreSQL) ──────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/aurum_banking
spring.datasource.username=${DB_USERNAME:aurum}
spring.datasource.password=${DB_PASSWORD:aurum}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── JPA / Hibernate ──────────────────────────────────────
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── Flyway ───────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ─── Actuator ─────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ─── Security / OAuth2 Resource Server ───────────────────
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/aurum}

# ─── Logging ──────────────────────────────────────────────
logging.level.com.aurum=DEBUG
logging.level.org.springframework.security=INFO
